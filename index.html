<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <title>ระบบนำทาง</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: system-ui, Arial;
      margin: 0;
      padding: 16px;
      max-width: 480px;
      margin: auto;
      background: #f5f5f5;
    }

    h1 {
      font-size: 20px;
      text-align: center;
      margin-bottom: 10px;
    }

    .start {
      background: #e8f0fe;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 16px;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 16px;
      margin: 6px 0;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      background: black;
      color: white;
      cursor: pointer;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      overflow-y: auto;
      backdrop-filter: blur(2px);
    }

    .modal-content {
      background-color: white;
      margin: 10% auto;
      padding: 20px;
      border-radius: 16px;
      width: 90%;
      max-width: 400px;
      position: relative;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .close {
      position: absolute;
      right: 12px;
      top: -8px;
      /* move upward above picture */

      font-size: 40px;
      font-weight: bold;

      color: red;
      /* red X */
      cursor: pointer;

      line-height: 1;
      z-index: 9999;
    }

    .close:hover {
      color: darkred;
    }

    .result h3 {
      margin-top: 0;
      padding-right: 25px;
    }

    ol {
      padding-left: 18px;
    }

    .note {
      margin-top: 10px;
      color: red;
      font-weight: bold;
    }

    .image-container {
      position: relative;
      margin-bottom: 10px;
    }

    .route-image {
      width: 100%;
      border-radius: 10px;
      display: block;
    }

    /* Eye icon */
    .eye-btn {
      position: absolute;
      width: 45px;
      height: 45px;
      border: none;
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      z-index: 5;
      padding: 0px;

      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    .eye-btn:hover {
      transform: scale(1.08);
    }

    .map-pin {
      position: absolute;
      width: 38px;
      height: 38px;

      transform: translate(-50%, -100%);
      z-index: 9;

      pointer-events: none;
    }

    /* second popup */
    #imageModal {
      z-index: 2000;
    }

    #popupImage {
      width: 100%;
      border-radius: 10px;
      display: block;
    }
  </style>
</head>

<body>

  <h1>📍 ระบบนำทาง</h1>

  <div class="start">
    คุณอยู่: ประชาสัมพันธ์ (ชั้น 1)
  </div>

  <p>เลือกปลายทาง:</p>

  <button onclick="show('black')">
    📂 ห้องเก็บสำนวนคดีดำ (ชั้น 1)
  </button>

  <button onclick="show('red')">
    📂 ห้องเก็บสำนวนคดีแดง (ชั้น B)
  </button>

  <button onclick="show('court')">
    ⚖️ ศูนย์หน้าบัลลังก์ (ชั้น 2)
  </button>

  <button onclick="show('officer')">
    👨‍💼 เจ้าพนักงานคดี (ชั้น 5)
  </button>

  <button onclick="show('mediation')">
    🤝 ศูนย์ไกล่เกลี่ย (ชั้น 8)
  </button>

  <!-- MAIN MODAL -->
  <div id="myModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <div id="result" class="result"></div>
    </div>
  </div>

  <!-- IMAGE POPUP -->
  <div id="imageModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeImageModal()">&times;</span>

      <img id="popupImage" src="">
    </div>
  </div>

  <script>
    const routes = {

      black: {
        title: "ห้องเก็บสำนวนคดีดำ",
        steps: [
          "เดินไปยังห้องเก็บสำนวนคดีดำ",
          "อยู่ชั้น 1"
        ],

        images: [
          {
            image: "images/FL1GIF.gif",

            pins: [
              {
                top: "90%",
                left: "62%"
              }
            ],
            

            eyes: [
              {
                top: "12%",
                left: "43%",
                popup: "images/black-detail.jpg"
              },
              {
                top: "75%",
                left: "43%",
                popup: "images/hall.png"
              }
            ]
          }
        ]
      },

      red: {
        title: "ห้องเก็บสำนวนคดีแดง",
        steps: [
          "ไปลิฟต์ลานจอดรถ (หรือใช้บันไดลงได้)",
          "ลงไปชั้น B",
          "ไปห้องเก็บสำนวนคดีแดง และศูนย์คัดถ่าย"
        ],
        note: "❗ ใช้ลิฟต์ลานจอดรถ",

        images: [

          {
            image: "images/FLG.gif",

            pins: [
              {
                top: "95%",
                left: "62%"
              }
            ],

            eyes: [
              {
                top: "14%",
                left: "43%",
                popup: "images/ERed.jpg"
              },
              {
                top: "80%",
                left: "43%",
                popup: "images/hall.png"
              }
            ]
          },

          {
            image: "images/FLRed.gif",

            eyes: [
              {
                top: "45%",
                left: "56%",
                popup: "images/red-detail2.jpg"
              }
            ]
          }
        ]
      },

      court: {
        title: "ศูนย์หน้าบัลลังก์",
        steps: [
          "ใช้ลิฟต์อาคารหลัก",
          "ขึ้นไปชั้น 2",
          "ออกจากลิฟต์ เลี้ยวซ้าย"
        ],
        note: "❗ ห้ามใช้ลิฟต์ลานจอดรถ",

        images: [

          {
            image: "images/FLUp.gif",

            pins: [
              {
                top: "90%",
                left: "62%"
              }
            ],

            eyes: [
              {
                top: "55%",
                left: "50%",
                popup: "images/court-detail1.jpg"
              }
            ]
          },

          {
            image: "images/Fl2.gif",

            eyes: [
              {
                top: "79%",
                left: "46%",
                popup: "images/front_of_admin.jpg"
              },
              {
                top: "81%",
                left: "56%",
                popup: "images/front_of_admin2.png"
              }
            ]
          }
        ]
      },

      officer: {
        title: "เจ้าพนักงานคดี",
        steps: [
          "ใช้ลิฟต์อาคารหลัก",
          "ขึ้นไปชั้น 5",
          "ออกจากลิฟต์ เลี้ยวซ้าย",
          "เดินตามป้าย"
        ],
        note: "❗ ห้ามใช้ลิฟต์ลานจอดรถ",

        images: [

          {
            image: "images/Fl1up.gif",

            pins: [
              {
                top: "95%",
                left: "65%"
              }
            ],

            eyes: [
              {
                top: "55%",
                left: "43%",
                popup: "images/court-detail1.jpg"
              }
            ]
          },

          {
            image: "images/FL5.gif",

            eyes: [
              {
                top: "36%",
                left: "79%",
                popup: "images/F5E.jpg"
              },
              {
                top: "77%",
                left: "46%",
                popup: "images/F5E2.jpg"
              }
            ]
          }
        ]
      },

      mediation: {
        title: "ศูนย์ไกล่เกลี่ย",
        steps: [
          "ใช้ลิฟต์อาคารหลัก",
          "ขึ้นไปชั้น 8"
        ],
        note: "❗ ห้ามใช้ลิฟต์ลานจอดรถ",

        images: [

          {
            image: "images/Fl1up.gif",

            pins: [
              {
                top: "95%",
                left: "65%"
              }
            ],

            eyes: [
              {
                top: "55%",
                left: "43%",
                popup: "images/court-detail1.jpg"
              }
            ]
          },

          {
            image: "images/FL8.gif",

            eyes: [
              {
                top: "80%",
                left: "46%",
                popup: "images/detail2.jpg"
              }
            ]
          }
        ]
      }
    };

    function show(key) {

      const route = routes[key];

      let html =
        `<h3>🧭 ไป: ${route.title}</h3><ol>`;

      route.steps.forEach(step => {
        html += `<li>${step}</li>`;
      });

      html += "</ol>";

      if (route.note) {
        html += `<div class="note">${route.note}</div>`;
      }

      if (route.images) {

        route.images.forEach(imgObj => {

          html += `
    <div class="image-container">

      <img
        src="${imgObj.image}"
        class="route-image"
      >
    `;

          if (imgObj.pins) {

            imgObj.pins.forEach(pin => {

              html += `
  <img
    src="images/location.png"
    class="map-pin"
    style="
      top:${pin.top};
      left:${pin.left};
    "
  >
  `;
            });
          }

          if (imgObj.eyes) {

            imgObj.eyes.forEach(eye => {

              html += `
        <button
          class="eye-btn"
          onclick="openImageModal('${eye.popup}')"
          style="
            top:${eye.top};
            left:${eye.left};
          "
        >
          <img
            src="images/searching.png"
            style="
              width:50px;
              height:50px;
              object-fit:contain;
              pointer-events:none;
            "
          >
        </button>
        `;
            });
          }

          html += `</div>`;
        });
      }

      document.getElementById("result").innerHTML = html;

      document.getElementById("myModal").style.display =
        "block";

      history.pushState(
        { modalOpen: true },
        ""
      );
    }

    function openImageModal(imgSrc) {
      document.getElementById("popupImage").src = imgSrc;
      document.getElementById("imageModal").style.display = "block";
    }

    function closeImageModal() {
      document.getElementById("imageModal").style.display = "none";
    }

    function closeModal(isPopState = false) {
      document.getElementById("myModal").style.display = "none";

      if (!isPopState && history.state && history.state.modalOpen) {
        history.back();
      }
    }

    window.onpopstate = function () {

      const imageModal =
        document.getElementById(
          "imageModal"
        );

      const mainModal =
        document.getElementById(
          "myModal"
        );

      /* first close image popup */
      if (
        imageModal.style.display ===
        "block"
      ) {

        closeImageModal();
        return;
      }

      /* then close main popup */
      if (
        mainModal.style.display ===
        "block"
      ) {

        closeModal(true);
        return;
      }
    };

    window.onclick = function (event) {

      const modal = document.getElementById("myModal");
      const imageModal = document.getElementById("imageModal");

      if (event.target == modal) {
        closeModal();
      }

      if (event.target == imageModal) {
        closeImageModal();
      }
    }
  </script>

</body>

</html>
