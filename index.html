<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <title>ระบบนำทาง</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: system-ui, Arial;
      margin: 0;
      padding: 16px;
      max-width: 480px;
      margin: auto;
      min-height: 100vh;

      background:
        linear-gradient(rgba(255, 255, 255, 0.55),
          rgba(255, 255, 255, 0.55)),
        url("images/bg.png");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    h1 {
      font-size: 20px;
      text-align: center;
      margin-bottom: 10px;
    }

    .start {
      background: #e8f0fe;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 16px;
      font-weight: bold;
    }

    button {
      width: 100%;
      padding: 16px;
      margin: 6px 0;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      background: black;
      color: white;
      cursor: pointer;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6);
      overflow-y: auto;
      backdrop-filter: blur(2px);
    }

    .modal-content {
      background-color: white;
      margin: 10% auto;
      padding: 20px;
      border-radius: 16px;
      width: 90%;
      max-width: 400px;
      position: relative;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    }

    .close {
      position: absolute;
      right: 12px;
      top: -8px;
      font-size: 40px;
      font-weight: bold;
      color: red;
      cursor: pointer;
      line-height: 1;
      z-index: 9999;
    }

    .close:hover {
      color: darkred;
    }

    .result h3 {
      margin-top: 0;
      padding-right: 25px;
    }

    ol {
      padding-left: 18px;
    }

    .note {
      margin-top: 10px;
      color: red;
      font-weight: bold;
    }

    .image-container {
      position: relative;
      margin-bottom: 10px;
    }

    .route-image {
      width: 100%;
      border-radius: 10px;
      display: block;
    }

    .eye-btn {
      position: absolute;
      width: 45px;
      height: 45px;
      border: none;
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      z-index: 5;
      padding: 0px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    .eye-btn:hover {
      transform: scale(1.08);
    }

    .map-pin {
      position: absolute;
      width: 38px;
      height: 38px;
      transform: translate(-50%, -100%);
      z-index: 9;
      pointer-events: none;
    }

    .stair-btn {
      position: absolute;
      width: 45px;
      height: 45px;
      border: none;
      background: transparent;
      cursor: pointer;
      z-index: 8;
      padding: 0;
      transform: translate(-50%, -100%);
    }

    .stair-btn:hover {
      transform: translate(-50%, -100%) scale(1.08);
    }

    .stair-icon {
      width: 50px;
      height: 50px;
      object-fit: contain;
      pointer-events: none;
    }

    #imageModal {
      z-index: 2000;
    }

    #popupImage {
      width: 100%;
      border-radius: 10px;
      display: block;
    }

    /* ── 3D model entry button ─────────────────────────────── */
    .model-3d-btn {
      background: linear-gradient(135deg, #5b4fcf, #8b7ff0);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    /* ── Live tracking entry button (inside route modal) ─────── */
    .track-btn {
      background: linear-gradient(135deg, #1f5c3a, #3fae6e);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
    }
  </style>
</head>

<body>

  <h1>📍 ระบบนำทาง</h1>

  <div class="start">
    คุณอยู่: ประชาสัมพันธ์ (ชั้น 1)
  </div>

  <p>เลือกปลายทาง:</p>

  <button onclick="show('black')">
    📂 ห้องเก็บสำนวนคดีดำ (ชั้น 1)
  </button>

  <button onclick="show('red')">
    📂 ห้องเก็บสำนวนคดีแดง (ชั้น B)
  </button>

  <button onclick="show('court')">
    ⚖️ ศูนย์หน้าบัลลังก์ (ชั้น 2)
  </button>

  <button onclick="show('officer')">
    👨‍💼 เจ้าพนักงานคดี (ชั้น 5)
  </button>

  <button onclick="show('mediation')">
    🤝 ศูนย์ไกล่เกลี่ย (ชั้น 8)
  </button>

  <!-- 3D model test page entry -->
  <button class="model-3d-btn" onclick="window.location.href='test.html'">
    📐 ดูโมเดล 3 มิติของอาคาร (ทดสอบ)
  </button>

  <!-- 3D model test page entry -->
  <button class="model-3d-btn" onclick="window.location.href='floor-selector-prototype.html'">
    📐 ดูUI 3 มิติของอาคาร (ทดสอบ)
  </button>

  <!-- MAIN MODAL -->
  <div id="myModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal()">&times;</span>
      <div id="result" class="result"></div>
    </div>
  </div>

  <!-- IMAGE POPUP (from main modal eye) -->
  <div id="imageModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeImageModal()">&times;</span>
      <img id="popupImage" src="">
    </div>
  </div>

  <!-- DEEP IMAGE POPUP (from stair map eye) -->
  <div id="deepImageModal" class="modal" style="z-index:3000;">
    <div class="modal-content">
      <span class="close" onclick="closeDeepImageModal()">&times;</span>
      <img id="deepPopupImage" src="" style="width:100%;border-radius:10px;display:block;">
    </div>
  </div>

  <script>
    const routes = {

      black: {
        title: "ห้องเก็บสำนวนคดีดำ",
        steps: [
          "เดินไปยังห้องเก็บสำนวนคดีดำ",
          "อยู่ชั้น 1"
        ],
        images: [
          {
            image: "images/FL1GIF.gif",
              
            eyes: [
              { top: "12%", left: "43%", popup: "images/black-detail.jpg" },
              { top: "75%", left: "43%", popup: "images/hall.png" }
            ]
          }
        ]
      },

      red: {
        title: "ห้องเก็บสำนวนคดีแดง",
        steps: [
          "ไปลิฟต์ลานจอดรถ (หรือใช้บันไดลงได้)",
          "ลงไปชั้น B",
          "ไปห้องเก็บสำนวนคดีแดง และศูนย์คัดถ่าย"
        ],
        note: "❗ ใช้ลิฟต์ลานจอดรถ",
        images: [
          {
            image: "images/FLG.gif",
            stairs: [
              {
                top: "12%",
                left: "72%",
                popupMap: {
                  image: "images/FLRed.gif",
                  eyes: [
                    { top: "45%", left: "56%", popup: "images/red-detail2.jpg" }
                  ]
                }
              }
            ],
            
            eyes: [
              { top: "14%", left: "43%", popup: "images/ERed.jpg" },
              { top: "80%", left: "43%", popup: "images/hall.png" }
            ]
          }
        ]
      },

      court: {
        title: "ศูนย์หน้าบัลลังก์",
        steps: [
          "ใช้ลิฟต์อาคารหลัก",
          "ขึ้นไปชั้น 2",
          "ออกจากลิฟต์ เลี้ยวซ้าย"
        ],
        note: "❗ ห้ามใช้ลิฟต์ลานจอดรถ",
        images: [
          {
            image: "images/FLUp.gif",
            
            eyes: [
              { top: "55%", left: "40%", popup: "images/court-detail1.jpg" }
            ]
          },
          {
            image: "images/Fl2.gif",
            eyes: [
              { top: "79%", left: "46%", popup: "images/front_of_admin.jpg" },
              { top: "81%", left: "56%", popup: "images/front_of_admin2.png" }
            ]
          }
        ]
      },

      officer: {
        title: "เจ้าพนักงานคดี",
        steps: [
          "ใช้ลิฟต์อาคารหลัก",
          "ขึ้นไปชั้น 5",
          "ออกจากลิฟต์ เลี้ยวซ้าย",
          "เดินตามป้าย"
        ],
        note: "❗ ห้ามใช้ลิฟต์ลานจอดรถ",
        images: [
          {
            image: "images/Fl1up.gif",
            
            eyes: [
              { top: "55%", left: "43%", popup: "images/court-detail1.jpg" }
            ]
          },
          {
            image: "images/FL5.gif",
            eyes: [
              { top: "36%", left: "79%", popup: "images/F5E.jpg" },
              { top: "77%", left: "46%", popup: "images/F5E2.jpg" }
            ]
          }
        ]
      },

      mediation: {
        title: "ศูนย์ไกล่เกลี่ย",
        steps: [
          "ใช้ลิฟต์อาคารหลัก",
          "ขึ้นไปชั้น 8"
        ],
        note: "❗ ห้ามใช้ลิฟต์ลานจอดรถ",
        images: [
          {
            image: "images/Fl1up.gif",
            
            eyes: [
              { top: "55%", left: "43%", popup: "images/court-detail1.jpg" }
            ]
          },
          {
            image: "images/FL8.gif",
            eyes: [
              { top: "80%", left: "46%", popup: "images/detail2.jpg" }
            ]
          }
        ]
      }
    };

    // ─── state tracking ───────────────────────────────────────────
    let uiLevel = 0;
    let currentRoute = null;

    // ─── helpers ──────────────────────────────────────────────────
    function pushLevel(level) {
      uiLevel = level;
      history.pushState({ uiLevel: level }, "");
    }

    // ─── show main modal ─────────────────────────────────────────
    function show(key) {
      currentRoute = key;
      renderMainModal(key);
      document.getElementById("myModal").style.display = "block";
      pushLevel(1);
    }

    function renderMainModal(key) {
      const route = routes[key];
      window.currentStairMaps = {};

      let html = `<h3>🧭 ไป: ${route.title}</h3><ol>`;
      route.steps.forEach(step => { html += `<li>${step}</li>`; });
      html += "</ol>";

      if (route.note) {
        html += `<div class="note">${route.note}</div>`;
      }

      if (route.images) {
        route.images.forEach(imgObj => {
          html += `<div class="image-container">
            <img src="${imgObj.image}" class="route-image">`;

          (imgObj.pins || []).forEach(pin => {
            html += `<img src="images/location.png" class="map-pin"
              style="top:${pin.top};left:${pin.left};">`;
          });

          (imgObj.stairs || []).forEach((stair, index) => {
            window.currentStairMaps[index] = stair.popupMap;
            html += `
              <button class="stair-btn" onclick="openMapPopup(${index})"
                style="top:${stair.top};left:${stair.left};">
                <img src="images/stairs.png" class="stair-icon">
              </button>`;
          });

          (imgObj.eyes || []).forEach(eye => {
            html += `
              <button class="eye-btn" onclick="openDeepImageModal('${eye.popup}')"
                style="top:${eye.top};left:${eye.left};">
                <img src="images/point.png"
                  style="width:50px;height:50px;object-fit:contain;pointer-events:none;">
              </button>`;
          });

          html += `</div>`;
        });
      }

      // ── Live tracking entry: pass the selected destination key via URL ──
      html += `
        <button class="track-btn" onclick="window.location.href='tracking.html?dest=${key}'">
          🟣 เริ่มเดินตามตำแหน่งจริง (Dead Reckoning)
        </button>`;

      document.getElementById("result").innerHTML = html;
    }

    // ─── stair map popup ─────────────────────────────────────────
    function openMapPopup(index) {
      const map = window.currentStairMaps[index];

      const modalContent = document.querySelector("#imageModal .modal-content");

      modalContent.innerHTML = `
        <span class="close" onclick="closeImageModal()">&times;</span>
        <div class="image-container" style="position:relative;">
          <img src="${map.image}" class="route-image">
          ${(map.pins || []).map(pin => `
            <img src="images/location.png" class="map-pin"
              style="top:${pin.top};left:${pin.left};">
          `).join("")}
          ${(map.eyes || []).map(eye => `
            <button class="eye-btn" onclick="openDeepImageModal('${eye.popup}')"
              style="top:${eye.top};left:${eye.left};">
              <img src="images/point.png"
                style="width:50px;height:50px;object-fit:contain;pointer-events:none;">
            </button>
          `).join("")}
        </div>`;

      document.getElementById("imageModal").style.display = "block";
      pushLevel(2);
    }

    // ─── image popup ─────────────────────────────────────────────
    function openImageModal(imgSrc) {
      const modalContent = document.querySelector("#imageModal .modal-content");
      modalContent.innerHTML = `
        <span class="close" onclick="closeImageModal()">&times;</span>
        <img id="popupImage" src="${imgSrc}" style="width:100%;border-radius:10px;display:block;">`;

      document.getElementById("imageModal").style.display = "block";
      pushLevel(3);
    }

    function closeImageModal() {
      document.getElementById("imageModal").style.display = "none";
    }

    function openDeepImageModal(imgSrc) {
      document.getElementById("deepPopupImage").src = imgSrc;
      document.getElementById("deepImageModal").style.display = "block";
      pushLevel(3);
    }

    function closeDeepImageModal() {
      document.getElementById("deepImageModal").style.display = "none";
    }

    // ─── close main modal ─────────────────────────────────────────
    function closeModal() {
      document.getElementById("myModal").style.display = "none";
      uiLevel = 0;
      history.pushState({ uiLevel: 0 }, "");
    }

    // ─── back button handler ──────────────────────────────────────
    window.onpopstate = function () {
      if (uiLevel === 3) {
        closeDeepImageModal();
        uiLevel = 2;
      } else if (uiLevel === 2) {
        closeImageModal();
        uiLevel = 1;
      } else if (uiLevel === 1) {
        document.getElementById("myModal").style.display = "none";
        uiLevel = 0;
      }
    };

    // ─── click-outside to close ───────────────────────────────────
    window.onclick = function (event) {
      const modal = document.getElementById("myModal");
      const imageModal = document.getElementById("imageModal");
      const deepImageModal = document.getElementById("deepImageModal");

      if (event.target === deepImageModal) {
        history.back();
      } else if (event.target === imageModal) {
        history.back();
      } else if (event.target === modal) {
        history.back();
      }
    };
  </script>

</body>
</html>
