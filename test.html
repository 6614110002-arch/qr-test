<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ทดสอบโมเดล 3D ศาลแพ่ง</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
<style>
  body {
    margin: 0;
    font-family: system-ui, Arial;
    background: #1a1a1a;
    color: white;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 12px 16px;
    background: #111;
    font-size: 15px;
    border-bottom: 1px solid #333;
  }
  model-viewer {
    flex: 1;
    width: 100%;
    background: #2b2b35;
    --poster-color: transparent;
  }
  .hint {
    padding: 10px 16px;
    font-size: 13px;
    color: #aaa;
    background: #111;
    border-top: 1px solid #333;
  }
  .error-box {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    color: #ddd;
    font-size: 14px;
    display: none;
  }
</style>
</head>
<body>

<header>📐 ทดสอบ Viewport: ศาลแพ่ง_Model.glb</header>

<div style="position:relative; flex:1;">
  <model-viewer
    id="viewer"
    src="ศาลแพ่ง_Model.glb"
    alt="โมเดล 3 มิติอาคารศาลแพ่ง"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    style="width:100%; height:100%;">
  </model-viewer>

  <div class="error-box" id="errorBox">
    ❌ ไม่พบไฟล์ ศาลแพ่ง_Model.glb<br>
    <small>วางไฟล์ .glb ไว้โฟลเดอร์เดียวกับ index.html นี้ แล้วรีเฟรชหน้า</small>
  </div>
</div>

<div class="hint">
  ลากเมาส์ = หมุนดูตึก | scroll = ซูม | ลองดูว่าโมเดลโหลดติด/หนักไหม บนมือถือจริง
</div>

<script>
  const viewer = document.getElementById('viewer');
  const errorBox = document.getElementById('errorBox');

  viewer.addEventListener('error', (e) => {
    console.error('model-viewer error:', e.detail);
    errorBox.style.display = 'block';
  });

  viewer.addEventListener('load', () => {
    console.log('โมเดลโหลดสำเร็จ');
    errorBox.style.display = 'none';
  });
</script>

</body>
</html>
